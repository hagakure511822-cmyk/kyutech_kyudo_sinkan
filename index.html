<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>九工大工学部弓道部 新入生歓迎サイト</title>
    <style>
	* {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}
        body {
            margin: 0;
            overflow: hidden;
            font-family: "Hiragino Mincho ProN", "serif";
            background-color: #fff;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f0f0f0;
            touch-action: none;
        }

        /* --- 背景レイアウト --- */
        #wall {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 15%;
            background-color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            /* さらに文字を上げるためpaddingを調整 */
            padding-bottom: 40px;
            box-sizing: border-box;
        }
        #curtain {
            position: absolute; bottom: 0; width: 100%; height: 40px;
            background-color: #3b2a63; border-bottom: 4px solid #222;
        }
        #azuchi {
            position: absolute;
            top: 15%; left: 0; width: 100%; height: 20%;
            background-color: #5d4e3b;
        }
        #grass {
            position: absolute;
            top: 35%; left: 0; width: 100%; height: 65%;
            background-color: #4a7c47;
        }

        /* --- メッセージ --- */
        #message {
            position: relative;
            width: 90%; 
            text-align: center;
            font-size: 1.1rem; 
            line-height: 1.4;
            font-weight: bold; 
            color: #333; 
            z-index: 20;
            user-select: none;
            pointer-events: none;
        }

        /* --- 的と矢（初期値維持） --- */
        #target {
            position: absolute;
            top: 25%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            z-index: 2;
            pointer-events: none;
        }

        #arrow {
            position: absolute;
            bottom: 330px; 
            left: 50%;
            width: 60px;
            z-index: 10;
            transform: translateX(-50%) rotate(180deg);
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
            transform-origin: center bottom;
        }

        .drawing {
            transform: translateX(-50%) rotate(180deg) translateY(-30px) !important;
            transition: transform 5s linear !important;
        }

        @keyframes arrow-wobble {
            0% { transform: translate(calc(-50% + var(--moveX)), var(--moveY)) scale(0.4) rotate(180deg); }
            25% { transform: translate(calc(-50% + var(--moveX)), var(--moveY)) scale(0.4) rotate(175deg); }
            50% { transform: translate(calc(-50% + var(--moveX)), var(--moveY)) scale(0.4) rotate(185deg); }
            75% { transform: translate(calc(-50% + var(--moveX)), var(--moveY)) scale(0.4) rotate(178deg); }
            100% { transform: translate(calc(-50% + var(--moveX)), var(--moveY)) scale(0.4) rotate(180deg); }
        }

        .hit-animation { animation: arrow-wobble 0.4s ease-out forwards; }

        #meter-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 12px; background: rgba(0, 0, 0, 0.2);
            border: 1px solid #000; border-radius: 6px; display: none; z-index: 20;
        }
        #meter-fill { width: 0%; height: 100%; background: linear-gradient(to right, #ffcc00, #ff3300); border-radius: 6px; }

        #result-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; color: white;
        }
        button { margin: 10px; padding: 15px 25px; font-size: 1.1rem; border: none; border-radius: 30px; cursor: pointer; width: 260px; font-family: inherit; }
        .btn-retry { background-color: #fff; color: #000; font-weight: bold; }
	.btn-info { 
            background-color: transparent; 
            color: #fff; 
            border: 2px solid #fff; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="wall">
        <div id="message">画面を長押し！<br>5秒ジャストで離せ！</div>
        <div id="curtain"></div>
    </div>
    
    <div id="azuchi"></div>
    <div id="grass"></div>

    <div id="meter-container"><div id="meter-fill"></div></div>

    <div id="result-modal">
        <h2 id="result-comment"></h2>
        <p id="result-detail"></p>
        <button class="btn-retry" onclick="resetGame()">もう一度プレイ</button>
        <button class="btn-info" onclick="window.open('九工大工学部弓道部 新入生用.pdf', '_blank')">弓道部の情報へ</button>
    </div>
</div>

<script>
    const arrow = document.getElementById('arrow');
    const target = document.getElementById('target');
    const azuchi = document.getElementById('azuchi');
    const meterContainer = document.getElementById('meter-container');
    const meterFill = document.getElementById('meter-fill');
    const message = document.getElementById('message');
    const resultModal = document.getElementById('result-modal');
    const resultComment = document.getElementById('result-comment');
    const resultDetail = document.getElementById('result-detail');

    let startTime;
    let timerInterval;
    let isHolding = false;
    let hasShot = false;

    document.addEventListener('pointerdown', (e) => {
        if (hasShot || resultModal.style.display === 'flex') return;
        if (e.target.tagName === 'BUTTON') return;
        isHolding = true;
        startTime = Date.now();
        meterContainer.style.display = 'block';
        arrow.classList.add('drawing');
        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const progress = Math.min((elapsed / 5000) * 100, 100);
            meterFill.style.width = progress + "%";
            if (elapsed >= 5000) {
                message.innerText = "今だ！";
                message.style.color = "#d93333";
            }
        }, 30);
    });

    document.addEventListener('pointerup', () => {
        if (!isHolding || hasShot) return;
        isHolding = false;
        hasShot = true;
        clearInterval(timerInterval);
        arrow.classList.remove('drawing');
        const duration = (Date.now() - startTime) / 1000;
        shootArrow(duration);
    });

    function shootArrow(seconds) {
        meterContainer.style.display = 'none';
        const diff = Math.abs(5 - seconds);
        const targetRect = target.getBoundingClientRect();
        const azuchiRect = azuchi.getBoundingClientRect();
        const arrowRect = arrow.getBoundingClientRect();
	const displaySeconds = seconds.toFixed(2);
        
        const tx = targetRect.left + targetRect.width / 2;
        const ty = targetRect.top + targetRect.height / 2;
        const ax = arrowRect.left + arrowRect.width / 2;
        const ay = arrowRect.top; 
        const h = arrowRect.height;

        let ox = 0, oy = 0, comment = "";
	
	if (displaySeconds === "5.00") {
            comment = "あなたは弓道の達人です！";
            ox = 0;
            oy = 0;
        } else if (diff < 0.05) {
            comment = "お見事！";
        } else if (diff < 0.4) {
            comment = (diff < 0.15) ? "ナイス！" : "的中！";
            const angle = Math.random() * Math.PI * 2;
            const distance = diff * 200; 
            ox = Math.cos(angle) * distance;
            oy = Math.sin(angle) * distance;
        } else {
            comment = "残念！外れました。";
            const angle = Math.random() * Math.PI * 2;
            const distance = 80 + (Math.min(diff, 2.0) * 100); 
            ox = Math.cos(angle) * distance;
            oy = Math.sin(angle) * distance;
        }

        const finalX = Math.max(azuchiRect.left + 25, Math.min(azuchiRect.right - 25, tx + ox));
        const finalY = Math.max(azuchiRect.top + 20, Math.min(azuchiRect.bottom - 20, ty + oy));

        const moveX = finalX - ax;
        const moveY = finalY - ay +28;

        arrow.style.transform = `translate(calc(-50% + ${moveX}px), ${moveY}px) scale(0.4) rotate(180deg)`;

        setTimeout(() => {
            arrow.style.setProperty('--moveX', `${moveX}px`);
            arrow.style.setProperty('--moveY', `${moveY}px`);
            arrow.classList.add('hit-animation');
            setTimeout(() => {
                showResult(seconds, comment);
            }, 500);
        }, 600);
    }

    function showResult(seconds, comment) {
        resultComment.innerText = comment;
        resultDetail.innerText = `記録: ${seconds.toFixed(2)}秒`;
        resultModal.style.display = 'flex';
    }

    function resetGame() {
        hasShot = false;
        isHolding = false;
        resultModal.style.display = 'none';
        message.innerText = "画面を長押し！\n5秒ジャストで離せ！";
        message.style.color = "#333";
        arrow.classList.remove('hit-animation', 'drawing');
        arrow.style.transform = "translateX(-50%) rotate(180deg) scale(1)";
        meterFill.style.width = "0%";
    }
</script>
